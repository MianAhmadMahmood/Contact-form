<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <button id="themeBtn" class="theme-btn">🌙 Dark Mode</button>

        <h1>Contact Form</h1>
        <p class="subtitle">Please fill out the form below:</p>

        <form id="contactForm">

            <div class="input-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <small class="error" id="nameError"></small>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <small class="error" id="emailError"></small>
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea id="message" rows="5" placeholder="Write your message"></textarea>
                <small class="error" id="messageError"></small>
            </div>

            <button type="submit" class="submit-btn">
                Send Message
            </button>

        </form>

        <p id="successMessage"></p>

    </div>

<script src="script.js"></script>

</body>
</html>
